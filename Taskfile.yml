version: '3'

# ── Environment ───────────────────────────────────────────────────────────────
# .env is loaded automatically by Task if it exists.
# Run `task init` to generate it.
dotenv: ['.env']

vars:
  IMAGE:        webauthn-proxy
  COMPOSE:      docker compose
  # All browser-facing traffic goes through Traefik — no direct proxy access.
  BASE_URL:     http://localhost:8000
  WHOAMI_URL:   http://localhost:8000/whoami
  DEFAULT_USER: testuser

# ── Tasks ─────────────────────────────────────────────────────────────────────
tasks:

  # ── Setup ──────────────────────────────────────────────────────────────────

  init:
    desc: "Generate .env with a fresh COOKIE_SECRET (run once before first `up`)"
    cmds:
      - |
        if [ -f .env ]; then
          echo ".env already exists — delete it first if you want to regenerate"
          exit 0
        fi
        SECRET=$(openssl rand -hex 32)
        cat > .env <<EOF
        # Generated by `task init` — do not commit this file
        COOKIE_SECRET=${SECRET}
        EOF
        echo ".env created with a fresh COOKIE_SECRET"
    silent: false

  # ── Build ──────────────────────────────────────────────────────────────────

  build:
    desc: "Build the webauthn-proxy Docker image (run `task update-distroless` first to pin the base)"
    cmds:
      - "{{.COMPOSE}} build webauthn-proxy"

  build:no-cache:
    desc: "Force-rebuild the image (no layer cache)"
    cmds:
      - "{{.COMPOSE}} build --no-cache webauthn-proxy"

  update-distroless:
    desc: "Pin Dockerfile to the latest gcr.io/distroless/static-debian12:nonroot digest"
    cmds:
      - |
        IMAGE="gcr.io/distroless/static-debian12:nonroot"
        DIGEST=$(docker buildx imagetools inspect "$IMAGE" \
          --format '{{"{{"}}index .Manifest.Digest{{"}}"}}' 2>/dev/null \
          || docker pull "$IMAGE" -q && docker inspect --format='{{"{{"}}index .RepoDigests 0{{"}}"}}' "$IMAGE" | cut -d@ -f2)
        if [ -z "$DIGEST" ]; then
          echo "Could not resolve digest for $IMAGE — is Docker running?" >&2
          exit 1
        fi
        # Replace any existing pinned or unpinned distroless FROM line
        sed -i.bak \
          "s|FROM gcr.io/distroless/static-debian12[^[:space:]]*|FROM gcr.io/distroless/static-debian12:nonroot@${DIGEST}|" \
          Dockerfile
        rm -f Dockerfile.bak
        echo "Pinned Dockerfile to $IMAGE@$DIGEST"

  # ── Lifecycle ──────────────────────────────────────────────────────────────

  pull:
    desc: "Pull third-party images (traefik, whoami) — requires network; run once before first `up`"
    cmds:
      - "{{.COMPOSE}} pull traefik whoami"

  up:
    desc: "Start the full stack (Traefik + webauthn-proxy + whoami)"
    deps: [_require-env]
    cmds:
      # Build the local image first, then start everything.
      # Compose will not re-pull third-party images that are already cached locally.
      # Run `task pull` once (when network is available) to fetch traefik + whoami.
      - "{{.COMPOSE}} build webauthn-proxy"
      - "{{.COMPOSE}} up -d"
      - task: wait-healthy
      - task: status

  down:
    desc: "Stop and remove containers (keeps the data volume)"
    cmds:
      - "{{.COMPOSE}} down"

  destroy:
    desc: "Stop containers AND delete the data volume (resets all registered users)"
    prompt: "This will delete all registered WebAuthn credentials. Continue?"
    cmds:
      - "{{.COMPOSE}} down -v"

  restart:
    desc: "Restart only the webauthn-proxy container (e.g. after a code change)"
    cmds:
      - "{{.COMPOSE}} up -d --build webauthn-proxy"
      - task: wait-healthy

  logs:
    desc: "Tail proxy logs"
    cmds:
      - "{{.COMPOSE}} logs -f webauthn-proxy"

  logs:all:
    desc: "Tail all service logs"
    cmds:
      - "{{.COMPOSE}} logs -f"

  status:
    desc: "Show running containers and open URLs"
    cmds:
      - "{{.COMPOSE}} ps"
      - |
        echo ""
        echo "  Login:          {{.BASE_URL}}/_webauthn/login"
        echo "  Protected app:  {{.WHOAMI_URL}}  (sample — requires login)"
        echo ""
        echo "  Register page is not public. To add the first passkey:"
        echo "    task create-user USER=alice && task bootstrap-token USER=alice"
        echo ""
    silent: false

  # ── User management ────────────────────────────────────────────────────────

  create-user:
    desc: "Bootstrap a user in the proxy (offline, no credentials). Usage: task create-user USER=alice"
    vars:
      USER: '{{.USER | default .DEFAULT_USER}}'
    cmds:
      - |
        echo "Creating user '{{.USER}}' ..."
        docker compose run --rm webauthn-proxy \
          create-user \
          --users-file /data/users.json \
          --username "{{.USER}}" \
          --display-name "{{.USER}}"

  bootstrap-token:
    desc: "Generate a signed, single-use registration URL bound to a specific user (pre-init only). Usage: task bootstrap-token USER=alice [DURATION=15m]"
    deps: [_require-env]
    vars:
      DURATION: '{{.DURATION | default "15m"}}'
    preconditions:
      - sh: '[ -n "{{.USER}}" ]'
        msg: |
          USER is required — the token is cryptographically bound to a username.
          Usage: task bootstrap-token USER=alice
    cmds:
      - |
        {{.COMPOSE}} run --rm webauthn-proxy \
          bootstrap-token \
          --cookie-secret "$COOKIE_SECRET" \
          --users-file /data/users.json \
          --username "{{.USER}}" \
          --proxy-url "{{.BASE_URL}}" \
          --duration "{{.DURATION}}"

  list-users:
    desc: "Print the current users.json from the data volume"
    cmds:
      - |
        docker run --rm \
          -v webauthn-proxy_webauthn_data:/data:ro \
          alpine cat /data/users.json 2>/dev/null \
          | python3 -m json.tool 2>/dev/null \
          || echo "(no users file yet)"

  # ── Health & smoke tests ───────────────────────────────────────────────────

  test:
    desc: "Run all smoke tests against the running stack (everything via Traefik)"
    deps: [_require-running]
    cmds:
      - task: test:ping
      - task: test:forward-auth-redirect
      - task: test:login-page
      - task: test:register-page
      - task: test:protected-redirects
      - task: test:api-auth-begin
      - |
        echo ""
        echo "All smoke tests passed."

  test:ping:
    desc: "Proxy /ping returns 200 via Traefik"
    internal: true
    cmds:
      - |
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" {{.BASE_URL}}/ping)
        [ "$STATUS" = "200" ] && echo "  PASS  /ping -> 200" \
          || (echo "  FAIL  /ping -> $STATUS (expected 200)"; exit 1)

  test:forward-auth-redirect:
    desc: "/_webauthn/auth returns 302 → login when unauthenticated"
    internal: true
    cmds:
      - |
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
          -H "X-Forwarded-Proto: http" \
          -H "X-Forwarded-Host: whoami.localhost" \
          -H "X-Forwarded-Uri: /" \
          {{.BASE_URL}}/_webauthn/auth)
        [ "$STATUS" = "302" ] && echo "  PASS  /_webauthn/auth (unauthenticated) -> 302" \
          || (echo "  FAIL  /_webauthn/auth -> $STATUS (expected 302)"; exit 1)

  test:login-page:
    desc: "/_webauthn/login serves HTML"
    internal: true
    cmds:
      - |
        CT=$(curl -s -o /dev/null -w "%{content_type}" {{.BASE_URL}}/_webauthn/login)
        echo "$CT" | grep -q "text/html" \
          && echo "  PASS  /_webauthn/login -> text/html" \
          || (echo "  FAIL  /_webauthn/login content-type: $CT"; exit 1)

  test:register-page:
    desc: "/_webauthn/register returns 404 without a valid token (endpoint is not public)"
    internal: true
    cmds:
      - |
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" {{.BASE_URL}}/_webauthn/register)
        [ "$STATUS" = "404" ] && echo "  PASS  /_webauthn/register (no token) -> 404" \
          || (echo "  FAIL  /_webauthn/register -> $STATUS (expected 404 — endpoint should not be publicly discoverable)"; exit 1)

  test:protected-redirects:
    desc: "Protected app (/whoami) redirects to login when unauthenticated"
    internal: true
    cmds:
      - |
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" {{.WHOAMI_URL}})
        [ "$STATUS" = "302" ] && echo "  PASS  /whoami (unauthenticated) -> 302" \
          || (echo "  FAIL  /whoami -> $STATUS (expected 302)"; exit 1)

  test:api-auth-begin:
    desc: "POST /_webauthn/api/authenticate/begin returns a WebAuthn challenge"
    internal: true
    cmds:
      - |
        BODY=$(curl -s -X POST \
          -H "Content-Type: application/json" \
          -d '{"rd":"/"}' \
          {{.BASE_URL}}/_webauthn/api/authenticate/begin)
        echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'publicKey' in d, 'missing publicKey'" \
          && echo "  PASS  /_webauthn/api/authenticate/begin -> challenge present" \
          || (echo "  FAIL  unexpected response: $BODY"; exit 1)

  test:api-register-begin-no-token:
    desc: "Register/begin without a valid BST or registration token returns 403"
    cmds:
      - |
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
          -X POST \
          -H "Content-Type: application/json" \
          -d '{"username":"smoketest_user"}' \
          {{.BASE_URL}}/_webauthn/api/register/begin)
        [ "$STATUS" = "403" ] && echo "  PASS  register/begin (no token) -> 403" \
          || (echo "  FAIL  register/begin -> $STATUS (expected 403 — open registration must be blocked)"; exit 1)

  # ── Helpers (internal) ────────────────────────────────────────────────────

  wait-healthy:
    desc: "Wait until the proxy is reachable via Traefik"
    internal: true
    cmds:
      - |
        echo "Waiting for stack to be ready..."
        for i in $(seq 1 30); do
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" {{.BASE_URL}}/ping 2>/dev/null)
          if [ "$STATUS" = "200" ]; then
            echo "  Ready after ${i}s"
            exit 0
          fi
          sleep 1
        done
        echo "  Timed out waiting for stack"
        exit 1

  _require-env:
    internal: true
    preconditions:
      - sh: "[ -n \"$COOKIE_SECRET\" ]"
        msg: |
          COOKIE_SECRET is not set.
          Run `task init` to generate .env, then retry.

  _require-running:
    internal: true
    preconditions:
      - sh: "curl -sf {{.BASE_URL}}/ping > /dev/null 2>&1"
        msg: |
          Stack is not running (no response on {{.BASE_URL}}/ping).
          Start it first with `task up`.
